<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Chat</title>
  <!-- Inline SVG favicon (a chat bubble) so the page needs no extra request and logs no 404. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%233b82f6'/><circle cx='5.5' cy='9' r='1' fill='white'/><circle cx='8' cy='9' r='1' fill='white'/><circle cx='10.5' cy='9' r='1' fill='white'/></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login / register screen, shown until the user is authenticated. -->
  <div id="auth">
    <div class="auth-card">
      <h1>Go Chat</h1>
      <div class="auth-tabs">
        <button type="button" id="tab-login" class="active">Log in</button>
        <button type="button" id="tab-register">Register</button>
      </div>
      <form id="auth-form" autocomplete="on">
        <input id="auth-username" type="text" placeholder="Username" autocomplete="username" />
        <input id="auth-display" type="text" placeholder="Display name" autocomplete="nickname" hidden />
        <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
        <button type="submit" id="auth-submit">Log in</button>
        <p id="auth-error" class="auth-error" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- Chat application, shown once authenticated. -->
  <div id="app" hidden>
    <aside id="sidebar">
      <h1>Go Chat</h1>
      <div id="account">
        <span id="account-name"></span>
        <button type="button" id="logout">Log out</button>
      </div>
      <div id="rooms-panel">
        <h2>Rooms</h2>
        <ul id="rooms"></ul>
        <form id="join-form">
          <input id="room-input" type="text" placeholder="Join or create a room" autocomplete="off" />
          <button type="submit">Join</button>
        </form>
      </div>
      <div id="presence-panel">
        <h2>Present</h2>
        <ul id="presence"></ul>
      </div>
    </aside>

    <main id="chat">
      <header id="chat-header">
        <span id="current-room">No room</span>
        <div class="header-right">
          <span id="online" title="connected clients">0 online</span>
          <span id="status" class="disconnected">disconnected</span>
        </div>
      </header>
      <ul id="messages"></ul>
      <form id="message-form">
        <input id="message-input" type="text" placeholder="Type a message…" autocomplete="off" disabled />
        <button type="submit" disabled>Send</button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
