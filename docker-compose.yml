# One-command demo: `docker compose up --build`, then open http://localhost:8080
# in two or three browser windows. Postgres is the only infrastructure v1 needs; the
# chat binary self-applies its schema migration on startup (NFR-D3, architecture §9).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  chat:
    build: .
    command:
      - "--addr=:8080"
      - "--db-url=postgres://chat:chat@postgres:5432/chat?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
